services:

  namenode:
    image: docker.m.daocloud.io/apache/hadoop:3
    container_name: namenode
    hostname: namenode
    restart: unless-stopped
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9001:9000"
    volumes:
      - ./data/namenode:/hadoop/dfs/name
    command: >
      bash -c "
      mkdir -p /hadoop/dfs/name &&
      if [ ! -d /hadoop/dfs/name/current ]; then
        hdfs namenode -format -force -nonInteractive;
      fi &&
      hdfs namenode
      "
    networks:
      - hive-net

  datanode:
    image: docker.m.daocloud.io/apache/hadoop:3
    container_name: datanode
    hostname: datanode
    restart: unless-stopped
    depends_on:
      - namenode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    volumes:
      - ./data/datanode:/hadoop/dfs/data
    command: >
      bash -c "
      mkdir -p /hadoop/dfs/data &&
      hdfs datanode
      "
    networks:
      - hive-net

  metastore:
    image: docker.m.daocloud.io/apache/hive:4.1.0
    container_name: metastore
    hostname: metastore
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
      SERVICE_OPTS: >
        -Dhive.metastore.warehouse.dir=/opt/hive/data/warehouse
        -Dfs.defaultFS=hdfs://namenode:9000
    ports:
      - "9083:9083"
    volumes:
      - ./data/warehouse:/opt/hive/data/warehouse
    networks:
      - hive-net

  hiveserver2:
    image: docker.m.daocloud.io/apache/hive:4.1.0
    container_name: hiveserver2
    hostname: hiveserver2
    restart: unless-stopped
    depends_on:
      - metastore
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      SERVICE_OPTS: >
        -Dhive.metastore.uris=thrift://metastore:9083
        -Dhive.server2.thrift.port=10000
        -Dhive.metastore.warehouse.dir=/opt/hive/data/warehouse
        -Dfs.defaultFS=hdfs://namenode:9000
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - ./data/warehouse:/opt/hive/data/warehouse
    networks:
      - hive-net

networks:
  hive-net:
    driver: bridge
